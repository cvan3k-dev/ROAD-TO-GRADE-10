<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', Tahoma, sans-serif; background:#0f0f1a; color:#e0e0e0; }
        .container { display:flex; min-height:100vh; }
        .sidebar { width:250px; background:#1a1a2e; border-right:2px solid #4a6fa5; padding:20px; }
        .sidebar h2 { color:#f7d44a; margin-bottom:20px; }
        .sidebar a { display:block; padding:12px 16px; color:#aaa; text-decoration:none; border-radius:8px; margin-bottom:5px; }
        .sidebar a:hover { background:#4a6fa5; color:white; }
        .main { flex:1; padding:30px; }
        .stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:20px; margin-bottom:30px; }
        .stat-card { background:#1a1a2e; padding:20px; border-radius:12px; text-align:center; border:1px solid #2a3f5a; }
        .stat-card .num { font-size:32px; color:#f7d44a; }
        .stat-card .label { color:#888; }
        .card-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px,1fr)); gap:20px; }
        .card { background:#1a1a2e; padding:25px; border-radius:12px; text-align:center; border:1px solid #2a3f5a; cursor:pointer; }
        .card:hover { border-color:#4a6fa5; transform:translateY(-3px); }
        .card .icon { font-size:48px; }
        .card .title { color:#f7d44a; font-weight:bold; margin-top:10px; }
        .btn { padding:8px 16px; border:2px solid #4a6fa5; background:transparent; color:white; border-radius:8px; cursor:pointer; }
        .btn:hover { background:#4a6fa5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>⚔️ Admin</h2>
            <a href="/admin/dashboard">📊 Dashboard</a>
            <a href="/admin/users">👥 Người dùng</a>
            <a href="/admin/survival-questions">📝 Câu hỏi Sinh tồn</a>
            <a href="/admin/logout" style="color:#e74c3c;">🚪 Đăng xuất</a>
        </div>
        <div class="main">
            <h1 style="color:#f7d44a;">📊 Dashboard</h1>
            <div class="stats">
                <div class="stat-card"><div class="num">{{ total_users }}</div><div class="label">Người dùng</div></div>
                <div class="stat-card"><div class="num">{{ total_xp }}</div><div class="label">Tổng XP</div></div>
                <div class="stat-card"><div class="num">{{ avg_level }}</div><div class="label">Level TB</div></div>
            </div>
            <div class="card-grid">
                <div class="card" onclick="location.href='/admin/users'"><div class="icon">👥</div><div class="title">Người dùng</div></div>
                <div class="card" onclick="location.href='/admin/survival-questions'"><div class="icon">📝</div><div class="title">Câu hỏi Sinh tồn</div></div>
            </div>
        </div>
    </div>
</body>
</html>
