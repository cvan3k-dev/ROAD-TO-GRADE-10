<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI', Tahoma, sans-serif; background:#0f0f1a; color:#e0e0e0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .login-box { background:#1a1a2e; padding:40px; border-radius:16px; border:2px solid #4a6fa5; width:100%; max-width:400px; }
        .login-box h1 { color:#f7d44a; text-align:center; margin-bottom:30px; }
        .login-box input { width:100%; padding:12px; margin-bottom:15px; background:#0f0f1a; border:2px solid #2a3f5a; color:white; border-radius:8px; }
        .login-box button { width:100%; padding:12px; background:#4a6fa5; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
        .login-box button:hover { background:#2a3f5a; }
        .error { color:#e74c3c; text-align:center; margin-bottom:15px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 Admin Login</h1>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Tên đăng nhập" required>
            <input type="password" name="password" placeholder="Mật khẩu" required>
            <button type="submit">Đăng nhập</button>
        </form>
    </div>
</body>
</html>
