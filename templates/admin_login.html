<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Road To Grade 10 RPG</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI', Tahoma, sans-serif;
            background:#0f0f1a; color:#e0e0e0;
            min-height:100vh; display:flex; align-items:center; justify-content:center;
        }
        .container {
            background:#1a1a2e; padding:40px; border-radius:12px;
            border:4px solid #e74c3c; max-width:400px; width:100%;
            box-shadow:0 0 30px rgba(231,76,60,0.2);
        }
        h1 { text-align:center; color:#e74c3c; font-size:28px; margin-bottom:10px; }
        .subtitle { text-align:center; color:#888; font-size:14px; margin-bottom:30px; }
        input {
            width:100%; padding:12px; background:#0f0f1a; border:2px solid #e74c3c;
            color:white; margin-bottom:15px; font-size:16px;
        }
        .pixel-btn {
            width:100%; padding:12px; background:#e74c3c; color:white;
            border:3px solid #a93226; font-weight:bold; cursor:pointer;
            transition:all 0.1s ease; font-size:16px;
        }
        .pixel-btn:hover { transform:translate(2px,2px); }
        .error { color:#e74c3c; text-align:center; margin-bottom:15px; }
        .back-link { text-align:center; margin-top:15px; }
        .back-link a { color:#f7d44a; text-decoration:none; }
        .back-link a:hover { text-decoration:underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 ADMIN</h1>
        <div class="subtitle">Đăng nhập để xem tiến độ học tập</div>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Tên đăng nhập" required>
            <input type="password" name="password" placeholder="Mật khẩu" required>
            <button type="submit" class="pixel-btn">ĐĂNG NHẬP</button>
        </form>
        <div class="back-link"><a href="/">⬅ Quay lại trang chủ</a></div>
    </div>
</body>
</html>
