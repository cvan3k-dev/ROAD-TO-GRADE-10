<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Road To Grade 10 RPG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 12px;
            border: 4px solid #4a6fa5;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 0 30px rgba(74, 111, 165, 0.2);
        }
        h1 { 
            text-align: center;
            color: #f7d44a;
            font-size: 28px;
            margin-bottom: 30px;
        }
        .pixel-btn {
            width: 100%;
            padding: 12px;
            background: #4a6fa5;
            color: white;
            border: 3px solid #2a3f5a;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            font-size: 16px;
        }
        .pixel-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: none;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #0f0f1a;
            border: 2px solid #4a6fa5;
            color: white;
            margin-bottom: 15px;
            font-size: 16px;
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin-bottom: 15px;
        }
        .link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .link a {
            color: #f7d44a;
            text-decoration: none;
        }
        .link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ ĐĂNG NHẬP</h1>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Tên đăng nhập" required>
            <input type="password" name="password" placeholder="Mật khẩu" required>
            <button type="submit" class="pixel-btn">VÀO GAME</button>
        </form>
        <div class="link">
            Chưa có tài khoản? <a href="/register">Đăng ký</a>
        </div>
    </div>
</body>
</html>
